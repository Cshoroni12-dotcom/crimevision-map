<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CrimeVision AR Glass UI</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.heat/dist/leaflet-heat.css"/>

  <style>
    html, body, #map { height: 100%; margin: 0; }

    /* Apple Glass Panels */
    .glass-panel {
      backdrop-filter: blur(20px);
      background-color: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 1rem;
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
      color: white;
    }

    /* Buttons */
    .glass-button {
      backdrop-filter: blur(10px);
      background-color: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 0.75rem;
      padding: 0.5rem 1rem;
      transition: all 0.3s ease;
    }

    .glass-button:hover {
      background-color: rgba(255,255,255,0.15);
      box-shadow: 0 0 15px rgba(0,255,255,0.4);
      transform: translateY(-2px);
    }
  </style>
</head>
<body class="bg-gray-900">

  <!-- Map -->
  <div id="map"></div>

  <!-- Dashboard Panel -->
  <div class="absolute top-6 left-6 w-80 p-5 glass-panel">
    <h2 class="text-2xl font-semibold mb-2">CrimeVision AR Dashboard</h2>
    <p class="text-white/80 mb-4">Current Crime Rate:</p>
    <div class="w-full h-4 bg-white/30 rounded-full overflow-hidden mb-4">
      <div id="crime-rate-bar" class="h-full bg-green-300 rounded-full" style="width: 0%;"></div>
    </div>
    <button id="refresh-btn" class="w-full glass-button text-white font-medium">Refresh Data</button>
  </div>

  <!-- Filters Panel -->
  <div class="absolute top-6 right-6 w-64 p-4 glass-panel">
    <h3 class="text-lg font-semibold mb-3">Filters</h3>
    <label class="flex items-center mb-2 cursor-pointer">
      <input type="checkbox" id="violent-checkbox" class="mr-2 accent-cyan-300" checked>
      Violent Crimes
    </label>
    <label class="flex items-center mb-2 cursor-pointer">
      <input type="checkbox" id="property-checkbox" class="mr-2 accent-green-300" checked>
      Property Crimes
    </label>
    <label class="flex items-center cursor-pointer">
      <input type="checkbox" id="other-checkbox" class="mr-2 accent-blue-200" checked>
      Other
    </label>
  </div>

  <!-- Leaflet JS + Heatmap -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
  <!-- External script -->
  <script src="script.js"></script>
</body>
</html>
