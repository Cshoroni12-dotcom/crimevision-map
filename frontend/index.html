<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CrimeVision AR Glass UI</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    html, body {
      height: 100%;
      margin: 0;
    }
    #map {
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* Apple Glass panel */
    .glass-panel {
      backdrop-filter: blur(20px);
      background-color: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 1rem;
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
      color: white;
      padding: 1rem;
      z-index: 1000;
      position: absolute;
    }

    .glass-button {
      backdrop-filter: blur(10px);
      background-color: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 0.75rem;
      padding: 0.5rem 1rem;
      color: white;
      font-weight: 500;
      transition: all 0.3s ease;
      cursor: pointer;
      width: 100%;
    }

    .glass-button:hover {
      background-color: rgba(255,255,255,0.15);
      box-shadow: 0 0 15px rgba(0,255,255,0.4);
      transform: translateY(-2px);
    }
  </style>
</head>
<body class="bg-gray-900">

  <!-- Map -->
  <div id="map"></div>

  <!-- Dashboard -->
  <div class="glass-panel" style="top: 1.5rem; left: 1.5rem; width: 20rem;">
    <h2 class="text-2xl font-semibold mb-2">CrimeVision AR Dashboard</h2>
    <p class="text-white/80 mb-4">Current Crime Rate:</p>
    <div class="w-full h-4 bg-white/30 rounded-full overflow-hidden mb-4">
      <div id="crime-rate-bar" class="h-full bg-green-300 rounded-full" style="width: 0%;"></div>
    </div>
    <button id="refresh-btn" class="glass-button">Refresh Data</button>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
  <script src="script.js"></script>
</body>
</html>
